name: Release rayskills

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve and validate tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi

          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Invalid release tag: $tag"
            exit 1
          fi

          echo "value=$tag" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/go.mod
          cache-dependency-path: cmd/go.mod

      - name: Test with race detector
        working-directory: cmd
        run: go test -race ./...

      - name: Vet
        working-directory: cmd
        run: go vet ./...

  build:
    name: Build ${{ matrix.platform }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [validate, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            platform: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            platform: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            platform: windows
            goarch: amd64
            archive: zip
          - goos: windows
            platform: windows
            goarch: arm64
            archive: zip
          - goos: darwin
            platform: macos
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            platform: macos
            goarch: arm64
            archive: tar.gz
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/go.mod
          cache-dependency-path: cmd/go.mod

      - name: Build and package
        working-directory: cmd
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PLATFORM: ${{ matrix.platform }}
          TAG: ${{ needs.validate.outputs.tag }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          mkdir -p ../dist/package

          binary="rayskills"
          if [ "$GOOS" = "windows" ]; then
            binary="${binary}.exe"
          fi

          artifact="rayskills-${TAG}-${PLATFORM}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${TAG}" \
            -o "../dist/package/${binary}" \
            .

          if [ "$ARCHIVE" = "zip" ]; then
            (cd ../dist/package && zip "../${artifact}.zip" "$binary")
          else
            (cd ../dist/package && tar -czf "../${artifact}.tar.gz" "$binary")
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayskills-${{ matrix.platform }}-${{ matrix.goarch }}
          path: dist/rayskills-*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build]
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rayskills-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum rayskills-* > checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "rayskills ${TAG}" \
              --generate-notes \
              --verify-tag
          fi
