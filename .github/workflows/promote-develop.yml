name: Promote develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-develop
  cancel-in-progress: true

jobs:
  validate:
    name: Validate tool
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/go.mod
          cache-dependency-path: cmd/go.mod

      - name: Test with race detector
        working-directory: cmd
        run: go test -race ./...

      - name: Vet
        working-directory: cmd
        run: go vet ./...

      - name: Validate cross-platform builds
        working-directory: cmd
        run: |
          mkdir -p /tmp/rayskills-builds
          for target in \
            linux/amd64 linux/arm64 \
            windows/amd64 windows/arm64 \
            darwin/amd64 darwin/arm64
          do
            goos="${target%/*}"
            goarch="${target#*/}"
            binary="/tmp/rayskills-builds/rayskills-${goos}-${goarch}"
            if [ "$goos" = "windows" ]; then
              binary="${binary}.exe"
            fi
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -o "$binary" .
          done

  pull-request:
    name: Open promotion pull request
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "$pr_number" ]; then
            pr_url="$(gh pr create \
              --base main \
              --head develop \
              --title "Promote develop to main" \
              --body "Automated promotion after tests, vet, and cross-platform builds passed on develop.")"
            pr_number="${pr_url##*/}"
          fi

          gh pr edit "$pr_number" \
            --add-label "automated-promotion" 2>/dev/null || true

          gh pr merge "$pr_number" --auto --merge
